name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to release (e.g. v0.1.0)'
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve tag
        id: tag
        # Untrusted/context values are passed via env (never interpolated into the script body)
        # to avoid Actions script injection; the value is then strictly validated.
        env:
          EVENT_NAME: ${{ github.event_name }}
          TAG_INPUT: ${{ github.event.inputs.tag }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            TAG="${TAG_INPUT#refs/tags/}"   # tolerate a pasted refs/tags/ prefix
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          # Reject anything outside a safe semver-tag charset (blocks CR/LF and shell metachars).
          case "$TAG" in
            *[!A-Za-z0-9.+_-]*) echo "::error::tag has characters outside [A-Za-z0-9.+_-]: '$TAG'"; exit 1 ;;
          esac
          # Require the vMAJOR.* shape.
          case "$TAG" in
            v[0-9]*) ;;
            *) echo "::error::tag must start with a version like v1.2.3 (got '$TAG')"; exit 1 ;;
          esac
          echo "name=$TAG" >> "$GITHUB_OUTPUT"

      - name: Verify (lint + self-tests)
        run: |
          shellcheck --severity=warning bin/*.sh test/run.sh
          sh test/run.sh

      - name: Build distributable
        env:
          TAG: ${{ steps.tag.outputs.name }}
        run: |
          git archive --format=tar.gz --prefix="master-claude-${TAG}/" \
            -o "master-claude-${TAG}.tar.gz" "${TAG}"
          sha256sum "master-claude-${TAG}.tar.gz" > "master-claude-${TAG}.tar.gz.sha256"
          ls -l master-claude-*.tar.gz*

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.tag.outputs.name }}
        run: |
          NOTES="docs/releases/${TAG}.md"
          # Use checked-in release notes when present; only auto-generate if they are empty.
          if [ -s "$NOTES" ]; then
            gh release create "$TAG" master-claude-"${TAG}".tar.gz* \
              --title "Master-Claude ${TAG}" --notes-file "$NOTES" --verify-tag
          else
            gh release create "$TAG" master-claude-"${TAG}".tar.gz* \
              --title "Master-Claude ${TAG}" --generate-notes --verify-tag
          fi
