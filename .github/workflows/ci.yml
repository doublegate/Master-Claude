name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Shell lint (shellcheck)
        # Fail on warning+ (errors/warnings); info/style notes are advisory and must not
        # break the build across shellcheck version drift between dev machines and CI.
        run: shellcheck --severity=warning bin/*.sh test/run.sh

      - name: Workflow lint (actionlint)
        # Lints .github/workflows for correctness and common security smells (e.g. injection).
        run: docker run --rm -v "$PWD":/repo --workdir /repo rhysd/actionlint:latest -color

      - name: Self-tests
        run: sh test/run.sh

      - name: Curation guard (no instruction module over 200 lines)
        run: |
          over=$(find master-core memory-core docs/knowledge -name '*.md' \
            -exec awk 'END{ if (NR > 200) print FILENAME" ("NR")" }' {} \;)
          if [ -n "$over" ]; then
            echo "Files exceeding the 200-line curation limit:"
            echo "$over"
            exit 1
          fi
          echo "OK: all instruction modules within the 200-line limit"
