name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read   # least-privilege; CI only needs to read the repo (CodeQL: actions/missing-workflow-permissions)

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Shell lint (shellcheck)
        # Fail on warning+ (errors/warnings); info/style notes are advisory and must not
        # break the build across shellcheck version drift between dev machines and CI.
        run: shellcheck --severity=warning bin/*.sh test/run.sh

      - name: Workflow lint (actionlint)
        # Lints .github/workflows for correctness and common security smells (e.g. injection).
        # Pinned to a version + immutable digest for reproducibility (Dependabot keeps it fresh).
        run: docker run --rm -v "$PWD":/repo --workdir /repo rhysd/actionlint:1.7.12@sha256:b1934ee5f1c509618f2508e6eb47ee0d3520686341fec936f3b79331f9315667 -color

      - name: Self-tests
        run: sh test/run.sh

      - name: Self-check (repo invariants)
        # Self-host gate: symlinks resolve, AGENTS.md + every module/doc <=200 lines,
        # VERSION present + semver, memory-core frontmatter complete, docs/modules aligned.
        run: sh bin/mc-selfcheck.sh
